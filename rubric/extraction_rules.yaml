# Extraction Rules Configuration
# Thresholds used by the Triage Agent and Extraction Router.
# Modify these values to tune classification without changing code.

origin_detection:
  # Characters per point² of page area.
  # Real native-digital PDFs (CBE annual reports, FTA survey) measure
  # 0.001 – 0.008. Pure scanned pages measure < 0.0002.
  # Threshold must sit between the two populations.
  min_char_density: 0.001

  # Image area / page area ratio.
  # A truly scanned page is one large embedded image → ratio ≈ 0.8–1.0.
  # Native-digital reports with photos/charts sit at 0.3–0.65.
  # Threshold raised to 0.7 so photo-heavy annual reports stay native_digital.
  scanned_image_ratio: 0.7

  # Only analyse the first N pages for speed (covers most doc headers / body).
  max_pages_to_sample: 5

# -------------------------------------------------------------------
# Layout Complexity Detection
# -------------------------------------------------------------------
layout_detection:
  # Maximum pages to inspect for layout analysis.
  max_pages_to_sample: 5

  # If tables occupy more than this fraction of total page area,
  # the document is classified as "table_heavy".
  table_area_ratio_threshold: 0.3

  # If image area ratio exceeds this AND char density is still high,
  # the document is classified as "figure_heavy".
  figure_ratio_threshold: 0.25

  # Minimum char density (chars / page_area) to consider a figure-heavy
  # page as still having meaningful text (not scanned).
  figure_char_density_min: 0.005

  # Coefficient of variation threshold for x-midpoints of text words.
  # Values above this suggest two distinct column clusters → multi_column.
  column_variance_threshold: 0.25

# -------------------------------------------------------------------
# Escalation & Confidence
# -------------------------------------------------------------------
escalation:
  # Minimum confidence for Strategy A before escalating to B
  strategy_a_min_confidence: 0.6
  # Minimum confidence for Strategy B before escalating to C
  strategy_b_min_confidence: 0.5
  # Minimum confidence for Strategy C (OCR) before escalating to D (Vision)
  strategy_c_min_confidence: 0.4
  # Maximum escalation chain length (A→B→C→D = 4)
  max_escalation_depth: 4

# -------------------------------------------------------------------
# Chunk Size Rules
# -------------------------------------------------------------------
chunking:
  max_tokens_per_chunk: 512
  min_tokens_per_chunk: 50
  overlap_tokens: 64

# -------------------------------------------------------------------
# Review Trigger Thresholds
# -------------------------------------------------------------------
review:
  # Confidence below this flags document for manual review
  flag_confidence_below: 0.4
  # Maximum image ratio for fast-text to pass without review
  max_image_ratio_fast_text: 0.5

